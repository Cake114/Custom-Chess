name: 自动更新资源文件清单

on:
  push:
    branches:
      - main  # 当你的主分支代码更新时触发（如果你的主分支叫 master，请修改为 master）

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 授予工作流写入权限，允许其把生成的 filelist.json 提交回仓库

    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 启动 Python 自动化扫描
        run: |
          python -c "
          import os, json
          # 扫描的目标资源文件夹
          target_dirs = ['buff', 'area', 'skill', 'characters', 'maps', 'lang']
          file_list = {}
          for folder in target_dirs:
              if os.path.exists(folder) and os.path.isdir(folder):
                  # 读取该目录下所有文件并进行自然排序
                  file_list[folder] = sorted([f for f in os.listdir(folder) if os.path.isfile(os.path.join(folder, f))])
              else:
                  file_list[folder] = []
          
          # 将结果整齐漂亮地写入 filelist.json
          with open('filelist.json', 'w', encoding='utf-8') as f:
              json.dump(file_list, f, ensure_ascii=False, indent=2)
          print('filelist.json 生成成功！')
          "

      - name: 自动提交更新至远程仓库
        run: |
          # 检查 filelist.json 是否有改动，若没有改动则无需二次 commit 造成冗余
          if [ -n "$(git status --porcelain filelist.json)" ]; then
            git config --local user.email "action@github.com"
            git config --local user.name "GitHub Action Bot"
            git add filelist.json
            git commit -m "Auto-update: filelist.json [skip ci]"
            git push
          else
            echo "清单文件无变动，跳过提交。"
          fi
